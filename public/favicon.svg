<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E5E5E5"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0055FF"/>
      <stop offset="100%" style="stop-color:#4D8EFF"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>
  
  <!-- Subtle border -->
  <rect x="8" y="8" width="496" height="496" rx="88" fill="none" stroke="#0055FF" stroke-width="4" opacity="0.3"/>
  
  <!-- SN8 Text -->
  <g transform="translate(256, 256)">
    <!-- S -->
    <text x="-130" y="55" 
          font-family="Space Grotesk, Arial Black, sans-serif" 
          font-size="180" 
          font-weight="700" 
          fill="url(#textGrad)"
          text-anchor="middle">S</text>
    
    <!-- N -->
    <text x="-5" y="55" 
          font-family="Space Grotesk, Arial Black, sans-serif" 
          font-size="180" 
          font-weight="700" 
          fill="url(#textGrad)"
          text-anchor="middle">N</text>
    
    <!-- 8 with accent color -->
    <text x="125" y="55" 
          font-family="Space Grotesk, Arial Black, sans-serif" 
          font-size="180" 
          font-weight="700" 
          fill="url(#accentGrad)"
          filter="url(#glow)"
          text-anchor="middle">8</text>
  </g>
  
  <!-- Subtle tech dots -->
  <circle cx="60" cy="60" r="6" fill="#0055FF" opacity="0.5"/>
  <circle cx="452" cy="452" r="6" fill="#0055FF" opacity="0.5"/>
  <circle cx="452" cy="60" r="4" fill="#4D8EFF" opacity="0.3"/>
  <circle cx="60" cy="452" r="4" fill="#4D8EFF" opacity="0.3"/>
</svg>